<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beat the Brewer – Results</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <header>
                <h1>🍺 Beat the Brewer</h1>
                <p class="subtitle">Results Dashboard</p>
            </header>

            <main>
                <!-- Loading indicator -->
                <div id="loading" class="loading">
                    <span class="spinner"></span>
                    Loading results...
                </div>

                <!-- Error message -->
                <div id="error" class="message error hidden">
                    Failed to load results. Please try refreshing the page.
                </div>

                <!-- Results content (hidden until loaded) -->
                <div id="results-content" class="results-content hidden">
                    
                    <!-- Summary table -->
                    <section class="results-section">
                        <h2>Ratings Summary</h2>
                        <div class="table-wrapper">
                            <table id="summary-table" class="results-table">
                                <thead>
                                    <tr>
                                        <th>Beer Name</th>
                                        <th>ABV</th>
                                        <th>Average Rating</th>
                                        <th>Number of Ratings</th>
                                    </tr>
                                </thead>
                                <tbody id="beers-table-body">
                                    <!-- Populated by JS -->
                                </tbody>
                            </table>
                        </div>
                        <p id="no-ratings" class="no-results hidden">No ratings yet. Be the first to vote!</p>
                    </section>

                    <!-- Comments table -->
                    <section class="results-section">
                        <h2>Comments</h2>
                        <div class="table-wrapper">
                            <table id="comments-table" class="results-table">
                                <thead>
                                    <tr>
                                        <th>Beer Name</th>
                                        <th>Rating</th>
                                        <th>Comment</th>
                                    </tr>
                                </thead>
                                <tbody id="comments-table-body">
                                    <!-- Populated by JS -->
                                </tbody>
                            </table>
                        </div>
                        <p id="no-comments" class="no-results hidden">No comments yet.</p>
                    </section>

                </div>
            </main>

            <footer>
                <a href="index.html">Submit a Rating</a>
            </footer>
        </div>
    </div>

    <script src="js/api.js" defer></script>
    <script defer>
        document.addEventListener('DOMContentLoaded', () => {
            loadRatingsSummary();
        });
    </script>
</body>
</html>
