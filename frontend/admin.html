<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beat the Brewer – Beer Configuration</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* Admin-specific styles */
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            font-size: 0.9rem;
        }

        .admin-table th,
        .admin-table td {
            padding: 0.75rem 0.5rem;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .admin-table th {
            background: #f5f5f7;
            font-weight: 600;
        }

        .admin-table tr:hover {
            background: #fafafa;
        }

        .btn-action {
            padding: 0.4rem 0.75rem;
            font-size: 0.85rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 0.25rem;
        }

        .btn-edit {
            background: #007aff;
            color: white;
        }

        .btn-edit:hover {
            background: #005ecb;
        }

        .btn-delete {
            background: #ff3b30;
            color: white;
        }

        .btn-delete:hover {
            background: #d63029;
        }

        .btn-clear {
            background: #8e8e93;
            color: white;
            margin-left: 0.5rem;
        }

        .btn-clear:hover {
            background: #6e6e73;
        }

        .form-row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .form-row .form-group {
            flex: 1;
            min-width: 120px;
        }

        .form-row .form-group.small {
            flex: 0 0 80px;
            min-width: 80px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding-top: 1.5rem;
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .checkbox-group label {
            margin: 0;
            cursor: pointer;
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .status-active {
            background: #34c759;
            color: white;
        }

        .status-inactive {
            background: #8e8e93;
            color: white;
        }

        .button-row {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .no-beers {
            text-align: center;
            color: #6e6e73;
            padding: 2rem;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        @media (max-width: 600px) {
            .form-row {
                flex-direction: column;
            }

            .form-row .form-group,
            .form-row .form-group.small {
                flex: 1 1 100%;
                min-width: 100%;
            }

            .checkbox-group {
                padding-top: 0;
            }

            .admin-table {
                font-size: 0.8rem;
            }

            .btn-action {
                padding: 0.3rem 0.5rem;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <header>
                <h1>🍺 Beer Configuration</h1>
                <p class="subtitle">Manage beers for this event</p>
            </header>

            <main>
                <!-- Beer Form -->
                <form id="beer-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="beer-id">Beer ID:</label>
                            <input 
                                type="text" 
                                id="beer-id" 
                                name="beerId" 
                                placeholder="e.g., beerA"
                                pattern="[a-zA-Z0-9_-]+"
                                title="Letters, numbers, dashes, underscores only"
                                required
                            >
                        </div>

                        <div class="form-group">
                            <label for="beer-name">Display Name:</label>
                            <input 
                                type="text" 
                                id="beer-name" 
                                name="name" 
                                placeholder="e.g., Little Full, Lotta Sap"
                                required
                            >
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group small">
                            <label for="beer-abv">ABV %:</label>
                            <input 
                                type="number" 
                                id="beer-abv" 
                                name="abv" 
                                placeholder="7.1"
                                min="0"
                                max="20"
                                step="0.1"
                            >
                        </div>

                        <div class="form-group">
                            <div class="checkbox-group">
                                <input 
                                    type="checkbox" 
                                    id="beer-active" 
                                    name="active" 
                                    checked
                                >
                                <label for="beer-active">Active (visible to voters)</label>
                            </div>
                        </div>
                    </div>

                    <div class="button-row">
                        <button type="submit" id="save-btn" class="btn-submit">Save Beer</button>
                        <button type="button" id="clear-btn" class="btn-action btn-clear">Clear Form</button>
                    </div>
                </form>

                <div id="message" class="message hidden"></div>

                <!-- Beers Table -->
                <section class="results-section" style="margin-top: 2rem;">
                    <h2>Current Beers</h2>
                    <div id="loading" class="loading">Loading beers...</div>
                    <div class="table-wrapper">
                        <table id="beers-table" class="admin-table hidden">
                            <thead>
                                <tr>
                                    <th>Beer ID</th>
                                    <th>Name</th>
                                    <th>ABV</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="beers-table-body">
                                <!-- Populated by JS -->
                            </tbody>
                        </table>
                    </div>
                    <p id="no-beers" class="no-beers hidden">No beers configured yet. Add one above!</p>
                </section>
            </main>

            <footer>
                <a href="index.html">Back to Voting</a> | <a href="results.html">View Results</a>
            </footer>
        </div>
    </div>

    <script src="js/api.js" defer></script>
    <script defer>
        document.addEventListener('DOMContentLoaded', () => {
            initBeerAdmin();
        });
    </script>
</body>
</html>
